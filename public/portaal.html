<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Begeister — portaal</title>
<link rel="icon" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap" rel="stylesheet">
<style>
/* Klantkant in exact dezelfde vormgeving als het projectbord van de app (pic1):
   near-black canvas, alles getint in de klantkleur (--scol), uppercase sectiekoppen,
   fasebalk met naam-pil. Geen maroon-achtergrond of achtergrondfoto meer. */
:root{
  --bg:#0d0d0d; --scol:#e0897c;
  --fw:300; --fw-nadruk:500;
  --r-sm:6px; --r-md:9px; --r-lg:12px; --r-pil:999px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--scol);
  font-family:'Outfit',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-weight:var(--fw);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100dvh}
b,strong{font-weight:var(--fw-nadruk)}
a{color:inherit}
button{font-family:inherit;font-weight:var(--fw);cursor:pointer}
:focus-visible{outline:none;box-shadow:0 0 0 2px var(--bg),0 0 0 4px color-mix(in srgb,var(--scol) 60%,transparent)}
input:focus-visible,textarea:focus-visible{box-shadow:none}

.wrap{max-width:1200px;margin:0 auto;padding:0 26px 70px}
.kop{position:sticky;top:0;z-index:5;background:transparent;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;gap:12px;padding:18px 0 14px;border-bottom:1px solid color-mix(in srgb,var(--scol) 20%,transparent)}
.merk{width:22px;height:26px;flex:none;color:var(--scol)}
.kop-naam{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:17px}
.kop-naam b{color:var(--scol);font-weight:var(--fw-nadruk)} .kop-naam span{color:color-mix(in srgb,var(--scol) 70%,transparent)}
.kop-status{font-size:12px;border:1px solid color-mix(in srgb,var(--scol) 45%,transparent);border-radius:var(--r-pil);padding:3px 11px;flex:none;color:var(--scol)}
.kop-uit{font-size:12px;color:color-mix(in srgb,var(--scol) 65%,transparent);background:none;border:none;padding:6px 2px}
.kop-uit:hover{color:var(--scol)}

.grid{display:grid;grid-template-columns:1.3fr 1fr;gap:40px;margin-top:20px}
@media(max-width:820px){.grid{grid-template-columns:1fr;gap:8px}}

/* secties — spiegelt .pb-sec / .pb-h uit de app */
.sec{border-top:1px solid color-mix(in srgb,var(--scol) 30%,transparent);padding:14px 0 6px;margin-bottom:14px}
.sec:first-child{border-top:none;padding-top:2px}
.h{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--scol);opacity:.92;font-weight:var(--fw-nadruk);margin:0 0 9px}
.tekst{color:var(--scol);line-height:1.6;max-width:60ch;white-space:pre-wrap}
.leeg{color:color-mix(in srgb,var(--scol) 62%,transparent);font-size:13px}
.rij{display:flex;align-items:flex-start;gap:11px;padding:7px 0;border-top:1px solid color-mix(in srgb,var(--scol) 20%,transparent)}
.rij:first-of-type{border-top:none}
.rij .dot{width:6px;height:6px;border-radius:50%;background:var(--scol);flex:none;position:relative;top:8px;opacity:.85}
.rij.klaar .tx{opacity:.45;text-decoration:line-through}
.tx{flex:1;min-width:0;color:var(--scol);font-size:14px}
.meta{font-size:13px;color:color-mix(in srgb,var(--scol) 62%,transparent);flex:none;margin-left:10px}

/* fasebalk — exact als .pb-fase in de app (zelfde padding/lijnpositie/dot/pil) */
.fases{position:relative;display:flex;align-items:flex-start;padding:30px 0 28px}
.fases::before{content:"";position:absolute;left:0;right:0;top:30px;height:2px;border-radius:999px;background:rgba(255,255,255,.11)}
.fases::after{content:"";position:absolute;left:0;top:30px;height:2px;border-radius:999px;width:var(--vul,0%);background:var(--scol);transition:width .25s ease}
.fstap{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;position:relative}
.fdot{width:2px;height:2px;flex:none;position:relative}
.fstap.nu .fdot::before{content:"";position:absolute;left:50%;top:50%;width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:var(--scol);box-shadow:0 0 0 2px var(--bg)}
.flbl{margin-top:14px;font-size:11px;letter-spacing:.01em;text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:#8a8a8a}
.fstap.nu .flbl{color:var(--scol);font-weight:var(--fw-nadruk)}
.fpil{position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%);white-space:nowrap;font-size:10px;font-weight:var(--fw-nadruk);letter-spacing:.02em;line-height:1;padding:4px 8px;border-radius:6px;color:var(--bg);background:var(--scol);z-index:3}
.fpil::after{content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--scol)}

/* bestanden — platte lijst (alleen de map Portaal) */
.frij{padding:8px 0;font-size:14px;border-top:1px solid color-mix(in srgb,var(--scol) 18%,transparent);display:flex;align-items:center;gap:9px}
.frij:first-of-type{border-top:none}
.fico{flex:none;color:color-mix(in srgb,var(--scol) 70%,transparent);display:inline-flex}
.flink{background:transparent;border:none;color:var(--scol);font-family:inherit;font-size:14px;text-align:left;padding:0;cursor:pointer;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flink:hover{text-decoration:underline}

/* rechterkolom: voorstellen + akkoord */
.vst{padding:9px 0;border-top:1px solid color-mix(in srgb,var(--scol) 20%,transparent)}
.vst:first-of-type{border-top:none}
.vstgroep{margin-top:18px;padding-top:14px;border-top:1px solid color-mix(in srgb,var(--scol) 30%,transparent)}
.vstgroep:first-of-type{border-top:none;margin-top:2px;padding-top:0}
.vstkop{font-size:15px;font-weight:var(--fw-nadruk);color:var(--scol)}
.vstsub{font-size:12px;color:color-mix(in srgb,var(--scol) 62%,transparent);margin:2px 0 8px}
.vstopen{background:transparent;border:none;color:var(--scol);font-family:inherit;font-size:14px;text-align:left;padding:0;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.poort{margin-top:12px}
.poort.groen{display:flex;align-items:center;gap:9px;font-size:14px;color:#9ff0bd;font-weight:var(--fw-nadruk)}
.poort .pdot{width:11px;height:11px;border-radius:50%;background:#5bd08a;flex:0 0 auto}
.poortnoot{font-size:11px;color:color-mix(in srgb,var(--scol) 55%,transparent);margin-top:8px}
.akkoord{margin-top:20px;padding-top:16px;border-top:1px solid color-mix(in srgb,var(--scol) 34%,transparent);text-align:center}
.akknoot{font-size:12px;color:color-mix(in srgb,var(--scol) 62%,transparent);margin:0 0 12px}
.akkbtn{background:var(--scol);color:var(--bg);border:none;border-radius:var(--r-pil);font-family:inherit;font-weight:var(--fw-nadruk);font-size:14px;padding:11px 26px;cursor:pointer}
.ta-rij{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid color-mix(in srgb,var(--scol) 14%,transparent)}
.ta-rij:last-child{border-bottom:none}
.ta-btn{background:var(--scol);color:var(--bg);border:none;border-radius:var(--r-pil);font-family:inherit;font-weight:var(--fw-nadruk);font-size:12.5px;padding:7px 16px;cursor:pointer;flex:0 0 auto}
.ta-ok{font-size:12.5px;color:#5bd08a;flex:0 0 auto;white-space:nowrap}
.akkbtn[disabled]{opacity:.5;cursor:default}
.akkoord.vast .groot{font-size:18px;color:var(--scol)}

/* document-viewer — beeldvullend op zwart, alleen naam + sluitkruis als dunne overlay */
#vstViewer{position:fixed;inset:0;z-index:70;background:#000;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;flex-direction:column}
#vstViewer.on{opacity:1;pointer-events:auto}
#vstViewer .vv-bar{position:absolute;left:0;right:0;top:0;z-index:2;display:flex;align-items:center;gap:14px;padding:12px 18px;background:linear-gradient(rgba(0,0,0,.72),transparent);color:#f2efe8}
#vstViewer .vv-naam{font-weight:var(--fw-nadruk);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.85}
#vstViewer .vv-x{background:transparent;border:none;color:#f2efe8;font-size:20px;cursor:pointer;line-height:1}
#vstViewer .vv-body{flex:1;background:#000;display:flex;align-items:center;justify-content:center}
#vstViewer .vv-frame{width:100%;height:100%;border:none;display:block;background:#000}
#vstViewer .vv-body img{max-width:100%;max-height:100%;object-fit:contain;display:block}

/* actie nodig — kaart per document met thumbnail, chip en knoppen */
.an-kaart{background:rgba(255,255,255,.05);border:1px solid color-mix(in srgb,var(--scol) 22%,transparent);border-radius:var(--r-lg);padding:14px;margin-bottom:12px}
.an-kop{display:flex;gap:14px;align-items:flex-start}
.an-info{flex:1;min-width:0}
.an-naam{background:transparent;border:none;padding:0;color:var(--scol);font-family:inherit;font-size:14.5px;text-align:left;cursor:pointer}
.an-naam:hover{text-decoration:underline}
.an-chip{display:inline-block;background:color-mix(in srgb,#f0a832 22%,transparent);color:#fac775;font-size:10.5px;letter-spacing:.08em;padding:3px 10px;border-radius:var(--r-pil);margin-left:8px;vertical-align:1px}
.an-sub{font-size:12px;color:color-mix(in srgb,var(--scol) 58%,transparent);margin-top:3px}
.an-knoppen{display:flex;gap:9px;flex-wrap:wrap;margin-top:11px}
.an-vraagknop{background:transparent;border:1px solid color-mix(in srgb,var(--scol) 32%,transparent);border-radius:var(--r-pil);color:var(--scol);font-size:12.5px;padding:7px 15px}
.an-vraagknop:hover{border-color:var(--scol)}
.thumb{flex:none;width:84px;height:58px;border-radius:var(--r-sm);overflow:hidden;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .tmini{position:absolute;left:0;top:0;width:1120px;height:774px;border:0;transform:scale(0.075);transform-origin:0 0;pointer-events:none;background:#fff}
.thumb.klein .tmini{transform:scale(0.0536)}
.thumb .tlbl{font-size:9.5px;letter-spacing:.1em;color:color-mix(in srgb,var(--scol) 70%,transparent);text-transform:uppercase;text-align:center;line-height:1.5;padding:4px}
.thumb.klein{width:60px;height:42px}
.f-ok{font-size:12px;color:#5bd08a;margin-top:2px}
.f-sub{font-size:12px;color:color-mix(in srgb,var(--scol) 55%,transparent);margin-top:2px}

/* inklapbare secties */
.h{cursor:pointer;user-select:none}
.h .chev{transition:transform .18s;flex:none}
.sec.dicht .h .chev{transform:rotate(180deg)}
.sec.dicht .sec-body{display:none}

/* opmerkingen */
.opm{margin-top:14px;border-top:1px solid color-mix(in srgb,var(--scol) 20%,transparent);padding-top:10px}
.opm-knop{background:none;border:none;color:color-mix(in srgb,var(--scol) 65%,transparent);font-size:12px;padding:2px 0;display:flex;align-items:center;gap:7px}
.opm-knop:hover{color:var(--scol)}
.opm-knop .chev{transition:transform .18s} .opm.open .opm-knop .chev{transform:rotate(180deg)}
.opm-body{max-height:0;overflow:hidden;transition:max-height .28s cubic-bezier(.16,1,.3,1)}
.opm.open .opm-body{max-height:1400px}
.opm-rij{padding:9px 0;border-top:1px solid color-mix(in srgb,var(--scol) 18%,transparent)} .opm-rij:first-child{border-top:none;margin-top:8px}
.opm-wie{font-size:11px;color:color-mix(in srgb,var(--scol) 55%,transparent);margin-bottom:2px} .opm-wie b{color:var(--scol)}
.opm textarea{width:100%;box-sizing:border-box;background:rgba(255,255,255,.03);border:1px solid color-mix(in srgb,var(--scol) 30%,transparent);border-radius:var(--r-md);color:var(--scol);font-family:inherit;font-size:13px;line-height:1.5;padding:9px 11px;margin-top:10px;resize:none;overflow:hidden;min-height:44px;outline:none}
.opm textarea:focus{border-color:color-mix(in srgb,var(--scol) 55%,transparent)}
.opm textarea::placeholder{color:color-mix(in srgb,var(--scol) 45%,transparent)}
.knop{background:transparent;border:1px solid color-mix(in srgb,var(--scol) 34%,transparent);border-radius:var(--r-md);color:var(--scol);font-size:13px;padding:7px 13px;margin-top:8px}
.knop:hover{border-color:var(--scol)}

/* login */
.login{max-width:340px;margin:16vh auto;text-align:center}
.login .merk{width:34px;height:40px;margin:0 auto 26px}
.login input{width:100%;background:rgba(255,255,255,.03);border:1px solid color-mix(in srgb,var(--scol) 30%,transparent);border-radius:var(--r-md);color:var(--scol);font-family:inherit;font-size:14px;padding:11px 13px;margin-bottom:10px}
.login input::placeholder{color:color-mix(in srgb,var(--scol) 45%,transparent)}
.login .akkbtn{width:100%;margin-top:6px}
.login-fout{color:#ffb4ab;font-size:13px;min-height:20px;margin-top:12px}
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{-webkit-text-fill-color:var(--scol);caret-color:var(--scol);-webkit-box-shadow:0 0 0 40px var(--bg) inset;transition:background-color 9999s}
.midden{text-align:center;color:color-mix(in srgb,var(--scol) 65%,transparent);padding:70px 20px}

#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(12px);opacity:0;background:#1a1a1a;border:1px solid color-mix(in srgb,var(--scol) 30%,transparent);border-radius:var(--r-md);color:var(--scol);padding:10px 16px;font-size:13px;transition:opacity .2s,transform .2s;pointer-events:none;z-index:20}
#toast.aan{opacity:1;transform:translateX(-50%)}

@media print{ .kop,.opm textarea,.knop,.akkbtn,#toast{display:none!important} }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB_URL="https://rwevsqwvgqbzypaudzuj.supabase.co";
const SB_KEY="sb_publishable_m_mWsrZEQXlok9gEWFeTbQ_80vnBEQL";
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true}});

const MERK='<svg viewBox="0 0 147.39 172.8" fill="none" stroke="currentColor" stroke-width="4" width="100%" height="100%"><path d="M73.7 4v164.8"/><path d="M6 40l135.4 92.8"/><path d="M141.4 40L6 132.8"/></svg>';
const CHEV='<svg class="chev" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6l6 -6"/></svg>';
const FICO='<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/></svg>';

const EMBED=new URLSearchParams(location.search).get('embed')==='1';
const PREVIEW=new URLSearchParams(location.search).get('preview');
let DATA=null, ACTIEF=0;
const OPEN_OPM=new Set();

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function datum(s){if(!s)return '';return new Date(s).toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});}
function kort(s){if(!s)return '';return new Date(s).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.className='aan';clearTimeout(el._t);el._t=setTimeout(()=>el.className='',3000);}
function mini(md){const uit=[];let a=[];const spoel=()=>{if(a.length){uit.push('<p style="margin:0 0 10px">'+a.join('<br>')+'</p>');a=[];}};
  String(md||'').split('\n').forEach(r=>{const t=r.trim();if(!t){spoel();return;}a.push(esc(t).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'));});spoel();return uit.join('');}

async function api(action,extra){
  const s=await sb.auth.getSession();const token=s.data.session&&s.data.session.access_token;
  if(!token){toonLogin();throw new Error('niet ingelogd');}
  const r=await fetch('/api/portal',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify(Object.assign({action},extra||{}))});
  const j=await r.json().catch(()=>({error:'onleesbaar'}));
  if(!r.ok){const e=new Error(j.error||'er ging iets mis');e.status=r.status;throw e;}
  return j;
}

/* login */
function toonLogin(fout){
  document.getElementById('app').innerHTML='<div class="login"><div class="merk">'+MERK+'</div>'
    +'<input id="lgMail" type="email" placeholder="E-mailadres" autocomplete="username">'
    +'<input id="lgWw" type="password" placeholder="Wachtwoord" autocomplete="current-password">'
    +'<button class="akkbtn" id="lgKnop">Inloggen</button><div class="login-fout">'+esc(fout||'')+'</div></div>';
  const doe=async()=>{const email=document.getElementById('lgMail').value.trim();const ww=document.getElementById('lgWw').value;
    if(!email||!ww)return;const k=document.getElementById('lgKnop');k.disabled=true;k.textContent='Momentje…';
    const {error}=await sb.auth.signInWithPassword({email,password:ww});
    if(error){toonLogin('Inloggen lukte niet. Klopt het wachtwoord?');return;}start();};
  document.getElementById('lgKnop').onclick=doe;
  document.getElementById('lgWw').onkeydown=e=>{if(e.key==='Enter')doe();};
}
async function uitloggen(){try{await sb.auth.signOut();}catch(_){}; location.href='/';}

/* render — hetzelfde dossier als het projectbord van de app (pic1), read-only */
function statusTekst(p){ if(p.akkoord)return 'akkoord op '+kort(p.akkoord.approved_at);
  return (p.fases[p.fase_index]||{}).l ? p.fases[p.fase_index].l.toLowerCase() : ''; }

// Thema per project: het team kiest op het projectbord een achtergrond (kleur of afbeelding)
// en de letterkleur (klantkleur/wit/zwart). Standaard blijft near-black + klantkleur.
function themaToe(p){
  const root=document.documentElement;
  const kl=(DATA&&DATA.klant&&DATA.klant.kleur)||'';
  const klant=/^#([0-9a-f]{6})$/i.test(kl)?kl:'#e0897c';
  const img=p&&p.bg_image;
  root.style.setProperty('--bg', '#0d0d0d');
  if(img){
    // Achtergrondafbeelding → automatisch zwarte overlay + witte tekst.
    root.style.setProperty('--scol', '#f4efe9');
    document.body.style.background='linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.62)), url("'+String(img).replace(/"/g,'&quot;')+'") center/cover no-repeat fixed, #0d0d0d';
  } else {
    // Standaard → zwarte achtergrond + klantkleur-letters.
    root.style.setProperty('--scol', klant);
    document.body.style.background='';
  }
}

// Inklapbare sectie — chevron omlaag (open) / omhoog (dicht), zoals overal in de app.
const DICHT_SEC=new Set();
function sec(key,titel,binnen,extraKop){
  const dicht=DICHT_SEC.has(key);
  return '<div class="sec'+(dicht?' dicht':'')+'" data-seckey="'+esc(key)+'"><div class="h" data-secklap="'+esc(key)+'"><span>'+esc(titel)+(extraKop||'')+'</span>'+CHEV+'</div><div class="sec-body">'+binnen+'</div></div>';
}
function _isBeeld(f){ return /\.(jpe?g|png|gif|webp|heic|heif)$/i.test(String(f.name||'')); }
// Thumbnail: echte afbeelding waar het kan, anders een rustig voorblad-blokje met het type.
function thumbHtml(f,klein){
  const open='toonVoorstel(\''+esc(String(f.link||'')).replace(/'/g,"\\'")+'\',\''+esc(String(f.name||'')).replace(/'/g,"\\'")+'\')';
  if(_isBeeld(f)&&f.link) return '<div class="thumb'+(klein?' klein':'')+'" onclick="'+open+'"><img src="'+esc(_vsrc(f.link))+'" alt="" loading="lazy"></div>';
  // Echte mini-weergave van het document: het bestand zelf, verkleind in een aanraak-doof iframe.
  if(f.link) return '<div class="thumb'+(klein?' klein':'')+'" onclick="'+open+'"><iframe class="tmini" src="'+esc(_vsrc(f.link))+'" loading="lazy" tabindex="-1" sandbox="allow-scripts" scrolling="no" aria-hidden="true"></iframe></div>';
  const n=String(f.name||'');
  const ext=(n.match(/\.(\w+)$/)||[])[1]||'doc';
  return '<div class="thumb'+(klein?' klein':'')+'" onclick="'+open+'"><span class="tlbl">'+esc(ext.toUpperCase())+'</span></div>';
}
function bestandenHtml(files,p){
  if(!files||!files.length) return '<div class="leeg">Nog niets gedeeld.</div>';
  return files.map(f=>{
    const open='toonVoorstel(\''+esc(String(f.link||'')).replace(/'/g,"\\'")+'\',\''+esc(String(f.name||'')).replace(/'/g,"\\'")+'\')';
    const vragen=((p&&p.opmerkingen&&p.opmerkingen['doc:'+f.id])||[]).length;
    let st='';
    if(f.akkoord_op) st='<div class="f-ok">✓ akkoord · '+esc(f.akkoord_door||'')+' · '+esc(kort(f.akkoord_op))+'</div>';
    else if(vragen) st='<div class="f-sub">'+vragen+' opmerking'+(vragen>1?'en':'')+'</div>';
    return '<div class="frij">'+thumbHtml(f,true)+'<div style="flex:1;min-width:0"><button class="flink" title="'+esc(f.name)+'" onclick="'+open+'">'+esc(f.name)+'</button>'+st+'</div></div>';
  }).join('');
}
// Actie nodig — de documenten die op een akkoord van de klant wachten.
function actieNodigHtml(p){
  const open=(p.ter_akkoord||[]).filter(f=>!f.akkoord_op);
  if(!open.length) return '';
  const kaarten=open.map(f=>{
    const bekijk='toonVoorstel(\''+esc(String(f.link||'')).replace(/'/g,"\\'")+'\',\''+esc(String(f.name||'')).replace(/'/g,"\\'")+'\')';
    return '<div class="an-kaart"><div class="an-kop">'+thumbHtml(f)
      +'<div class="an-info"><button class="an-naam" onclick="'+bekijk+'">'+esc(f.name||'document')+'</button><span class="an-chip">TER AKKOORD</span>'
      +'<div class="an-sub">Klik om te bekijken — opent beeldvullend</div>'
      +'<div class="an-knoppen"><button class="ta-btn" onclick="docAkkoord(\''+esc(String(f.id))+'\',this)">Akkoord geven</button>'
      +'<button class="an-vraagknop" data-opmtoggle="doc:'+esc(String(f.id))+'" data-scrollopen="1">Vraag of opmerking</button></div>'
      +'</div></div>'+opmHtml('doc:'+f.id,p)+'</div>';
  }).join('');
  return sec('actie','Actie nodig',kaarten,' <span style="opacity:.6">· '+open.length+'</span>');
}

function render(){
  if(!DATA)return;
  const p=DATA.projecten[ACTIEF];
  themaToe(p);
  if(!p){ document.getElementById('app').innerHTML='<div class="wrap">'+kopHtml(null)+'<div class="midden">Er staat nog niets voor je klaar.<br>We laten het weten zodra dat verandert.</div></div>';
    const u=document.getElementById('kopUit'); if(u)u.onclick=uitloggen; return; }

  let L='';
  if(p.toon_omschrijving && (p.omschrijving||'').trim()) L+=sec('oms','Omschrijving','<div class="tekst">'+mini(p.omschrijving)+'</div>'+opmHtml('omschrijving',p));
  if(p.toon_feiten && (p.feiten||[]).length) L+=sec('weten','Wat we weten',p.feiten.map(t=>'<div class="rij"><span class="dot"></span><span class="tx">'+esc(t||'')+'</span></div>').join(''));
  if(p.toon_voortgang){
    const vul=(((p.fase_index+0.5)/Math.max(1,p.fases.length))*100).toFixed(2)+'%';
    const naam=(DATA.klant&&DATA.klant.naam)||'';
    const stappen=p.fases.map((f,i)=>'<div class="fstap'+(i<=p.fase_index?' done':'')+(i===p.fase_index?' nu':'')+'">'+(i===p.fase_index?'<span class="fpil">'+esc(naam)+'</span>':'')+'<span class="fdot"></span><span class="flbl">'+esc(f.l)+'</span></div>').join('');
    L+=sec('voortgang','Voortgang','<div class="fases" style="--vul:'+vul+'">'+stappen+'</div>'); }
  if((p.wacht||[]).length) L+=sec('wacht','In afwachting',p.wacht.map(it=>'<div class="rij"><span class="dot"></span><span class="tx">'+esc(it.t||'')+'</span></div>').join(''));
  if((p.taken||[]).length) L+=sec('taken','Taken',p.taken.map(it=>'<div class="rij'+(it.done?' klaar':'')+'"><span class="dot"></span><span class="tx">'+esc(it.t||'')+'</span></div>').join(''));

  let R='';
  R+=actieNodigHtml(p);
  if((p.afspraken||[]).length) R+=sec('afspraken','Afspraken',p.afspraken.map(a=>'<div class="rij"><span class="tx">'+esc(a.t||'Afspraak')+'</span><span class="meta">'+esc(kort(a.date))+(a.start?' · '+esc(String(a.start).slice(0,5)):'')+'</span></div>').join(''));
  if((p.bestanden||[]).length) R+=sec('bestanden','Bestanden',bestandenHtml(p.bestanden,p));

  // Voorstellen per spoor (idee / budget), elk met eigen opmerkingen en akkoord.
  const vs=p.voorstellen||[];
  if(vs.length){
    let V='<div class="sec"><div class="h">Voorstellen</div>';
    if(p.poorten&&p.poorten.idee&&p.poorten.budget) V+='<div class="akkoord vast"><div class="groot">Idee én budget akkoord</div><div class="akknoot" style="margin-top:8px">Dit is de opdrachtbevestiging — we zijn in productie.</div></div>';
    [['idee','Idee','Het ontwerp — wat we gaan maken.'],['budget','Budget','De kosten — wat het gaat kosten.']].forEach(([soort,titel,uitleg])=>{
      const lijst=vs.filter(f=>(f.soort||'idee')===soort);
      if(!lijst.length) return;
      const dt=(p.poorten||{})[soort];
      V+='<div class="vstgroep"><div class="vstkop">'+titel+'</div><div class="vstsub">'+uitleg+'</div>';
      V+=lijst.map(f=>'<div class="vst"><button class="vstopen" data-vopen="'+esc(f.id)+'" data-vlink="'+esc(f.link||'')+'" data-vnaam="'+esc(f.name)+'">'+esc(f.name)+'</button></div>').join('');
      if(dt) V+='<div class="poort groen"><span class="pdot"></span>Akkoord op '+esc(datum(dt))+'</div>';
      else V+='<div class="poort"><button class="akkbtn" data-gate="'+soort+'">Akkoord op '+titel.toLowerCase()+'</button><div class="poortnoot">Klopt er iets niet? Zet hieronder een opmerking; dan maken we een nieuwe ronde.</div></div>';
      V+=opmHtml('voorstel:'+soort,p);
      V+='</div>';
    });
    V+='</div>';
    R+=V;
  }

  if(!L) L='<div class="midden">Nog niets om te tonen.</div>';
  document.getElementById('app').innerHTML='<div class="wrap">'+kopHtml(p)+'<div class="grid"><div class="colL">'+L+'</div><div class="colR">'+R+'</div></div></div>';
  bind(p);
}

function kopHtml(p){
  if(EMBED) return '';
  return '<div class="kop"><div class="merk">'+MERK+'</div>'
    +'<div class="kop-naam"><b>'+esc(DATA.klant.naam)+'</b>'+(p?' <span>· '+esc(p.naam)+'</span>':'')+'</div>'
    +(p?'<div class="kop-status">'+esc(statusTekst(p))+'</div>':'')
    +'<button class="kop-uit" id="kopUit">uitloggen</button></div>';
}

function opmHtml(sectie,p){
  const lijst=(p.opmerkingen&&p.opmerkingen[sectie])||[];
  const open=OPEN_OPM.has(sectie);
  const draad=lijst.map(c=>'<div class="opm-rij"><div class="opm-wie"><b>'+esc(c.author||'')+'</b> · '+esc(datum(c.created_at))+'</div><div>'+esc(c.body)+'</div></div>').join('');
  return '<div class="opm'+(open?' open':'')+'"><button class="opm-knop" data-opmtoggle="'+sectie+'">'+CHEV+'Opmerkingen'+(lijst.length?' ('+lijst.length+')':'')+'</button>'
    +'<div class="opm-body">'+draad+'<textarea id="ot_'+sectie+'" rows="2" placeholder="Een opmerking bij dit onderdeel…" oninput="this.style.height=\'auto\';this.style.height=(this.scrollHeight+2)+\'px\'"></textarea><div><button class="knop" data-opm="'+sectie+'">Plaatsen</button></div></div></div>';
}

function bind(p){
  const u=document.getElementById('kopUit'); if(u)u.onclick=uitloggen;
  document.querySelectorAll('[data-secklap]').forEach(h=>h.onclick=()=>{ const k=h.dataset.secklap; DICHT_SEC.has(k)?DICHT_SEC.delete(k):DICHT_SEC.add(k); const el=h.closest('.sec'); if(el)el.classList.toggle('dicht'); });
  document.querySelectorAll('[data-opmtoggle]').forEach(b=>b.onclick=()=>{ const s=b.dataset.opmtoggle;
    if(b.dataset.scrollopen){ OPEN_OPM.add(s); const wrap=b.closest('.an-kaart'); const el=wrap&&wrap.querySelector('.opm'); if(el){ el.classList.add('open'); const ta=el.querySelector('textarea'); if(ta)setTimeout(()=>ta.focus(),50); } return; }
    OPEN_OPM.has(s)?OPEN_OPM.delete(s):OPEN_OPM.add(s); const el=b.closest('.opm'); if(el)el.classList.toggle('open'); });
  document.querySelectorAll('[data-opm]').forEach(b=>b.onclick=async()=>{ const s=b.dataset.opm; const ta=document.getElementById('ot_'+s); const t=(ta.value||'').trim(); if(!t)return; b.disabled=true;
    try{ await api('reactie',{project_id:p.id,sectie:s,body:t}); ta.value=''; OPEN_OPM.add(s); toast('Geplaatst.'); await laad(); }catch(e){ toast(e.message); b.disabled=false; } });
  document.querySelectorAll('[data-gate]').forEach(b=>b.onclick=async()=>{ const soort=b.dataset.gate;
    if(!confirm('Akkoord geven op '+(soort==='budget'?'het budget':'het idee')+'? We gaan hiermee verder.'))return; b.disabled=true; b.textContent='Momentje…';
    try{ await api('akkoord',{project_id:p.id,soort}); toast('Akkoord vastgelegd.'); await laad(); }catch(e){ toast(e.message); b.disabled=false; b.textContent='Akkoord geven'; } });
  document.querySelectorAll('[data-vopen]').forEach(b=>b.onclick=()=>toonVoorstel(b.dataset.vlink,b.dataset.vnaam));
}

// Dropbox-link → server-proxy zodat het bestand INLINE rendert (Dropbox toont anders z'n eigen pagina).
function _vraw(link){ let u=String(link||'').replace('://www.dropbox.com/','://dl.dropboxusercontent.com/').replace('://dropbox.com/','://dl.dropboxusercontent.com/'); u=u.replace(/([?&])dl=\d&?/,'$1').replace(/[?&]$/,''); return u; }
function _vsrc(link){ return /dropbox/i.test(link||'') ? '/api/fileproxy?u='+encodeURIComponent(_vraw(link)) : (link||''); }
// Een document (deck of bestand) schermvullend tonen, in een afgeschermde iframe.
function toonVoorstel(link,naam){
  if(!link){ toast('Dit bestand heeft geen link.'); return; }
  let ov=document.getElementById('vstViewer');
  if(!ov){ ov=document.createElement('div'); ov.id='vstViewer';
    ov.innerHTML='<div class="vv-bar"><span class="vv-naam"></span><span style="flex:1"></span><button class="vv-x" title="Sluiten">✕</button></div><div class="vv-body"></div>';
    document.body.appendChild(ov);
    ov.querySelector('.vv-x').onclick=()=>ov.classList.remove('on');
    document.addEventListener('keydown',e=>{ if(e.key==='Escape'){const o=document.getElementById('vstViewer'); if(o)o.classList.remove('on');} });
  }
  ov.querySelector('.vv-naam').textContent=naam||'Bestand';
  const body=ov.querySelector('.vv-body');
  if(/\.(jpe?g|png|gif|webp|heic|heif)$/i.test(String(naam||''))) body.innerHTML='<img src="'+esc(_vsrc(link))+'" alt="">';
  else body.innerHTML='<iframe class="vv-frame" sandbox="allow-scripts allow-popups" src="'+esc(_vsrc(link))+'"></iframe>';
  ov.classList.add('on');
}

async function laad(){ const j=PREVIEW?await api('preview',{project_id:PREVIEW}):await api('data'); DATA=j; if(ACTIEF>=DATA.projecten.length)ACTIEF=0; render(); }
async function docAkkoord(id,btn){
  if(PREVIEW){ toast('Voorbeeld — akkoord geven doet de klant zelf.'); return; }
  if(!confirm('Akkoord geven op dit document? Dit wordt vastgelegd met je naam en datum.')) return;
  if(btn){ btn.disabled=true; btn.textContent='Momentje…'; }
  try{ const p=DATA.projecten[ACTIEF]; await api('doc_akkoord',{file_id:id,project_id:p&&p.id}); toast('Akkoord vastgelegd — dank je wel.'); await laad(); }
  catch(e){ toast(e.message); if(btn){ btn.disabled=false; btn.textContent='Akkoord geven'; } }
}

async function start(){
  const s=await sb.auth.getSession();
  if(!s.data.session) return toonLogin();
  const email=(s.data.session.user&&s.data.session.user.email)||'';
  if(!EMBED && !PREVIEW && /jeroen|marlon/i.test(email)){ location.replace('/'); return; }
  try{ await laad(); }
  catch(e){ if(/niet ingelogd/.test(e.message)) return toonLogin();
    document.getElementById('app').innerHTML='<div class="wrap"><div class="midden">Er staat nog geen portaal voor je klaar.<br><span style="font-size:13px">Neem contact op met Begeister als dit niet klopt.</span></div></div>'; }
}
sb.auth.onAuthStateChange(ev=>{ if(ev==='SIGNED_OUT') toonLogin(); });
start();
</script>
