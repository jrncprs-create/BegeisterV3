<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Begeister — portaal</title>
<link rel="icon" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap" rel="stylesheet">
<style>
:root{ --rood:#5a1f1f; --fw:300; --fw-nadruk:500; --r-md:9px; --r-lg:12px; --r-pil:999px; }
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--rood);color:#fff;
  font-family:'Outfit',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-weight:var(--fw);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100dvh}
b,strong{font-weight:var(--fw-nadruk)}
a{color:inherit}
button{font-family:inherit;font-weight:var(--fw);cursor:pointer}
:focus-visible{outline:none;box-shadow:0 0 0 2px var(--rood),0 0 0 4px rgba(255,255,255,.5)}

/* achtergrondafbeelding met donkere waas voor leesbaarheid */
#bg{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;display:none}
#bgtint{position:fixed;inset:0;z-index:-1;background:rgba(90,31,31,.72);display:none}
body.heeftbg #bg,body.heeftbg #bgtint{display:block}

.wrap{max-width:1200px;margin:0 auto;padding:0 26px 70px}
.kop{position:sticky;top:0;z-index:5;background:var(--rood);display:flex;align-items:center;gap:12px;padding:18px 0 14px;border-bottom:1px solid rgba(255,255,255,.2)}
body.heeftbg .kop{background:transparent;backdrop-filter:blur(3px)}
.merk{width:22px;height:26px;flex:none;color:#fff}
.kop-naam{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kop-naam b{color:#fff} .kop-naam span{color:rgba(255,255,255,.6)}
.kop-status{font-size:12px;border:1px solid rgba(255,255,255,.35);border-radius:var(--r-pil);padding:3px 11px;flex:none}
.kop-uit{font-size:12px;color:rgba(255,255,255,.6);background:none;border:none;padding:6px 2px}
.kop-uit:hover{color:#fff}

.grid{display:grid;grid-template-columns:1.3fr 1fr;gap:26px;margin-top:26px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.sec{margin-bottom:24px}
.h{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.65);font-weight:var(--fw-nadruk);margin:0 0 10px}
.tekst{color:#fff;line-height:1.6;max-width:60ch;white-space:pre-wrap}
.leeg{color:rgba(255,255,255,.5);font-size:13px}
.rij{display:flex;align-items:baseline;gap:11px;padding:9px 0;border-top:1px solid rgba(255,255,255,.14)}
.rij:first-of-type{border-top:none}
.rij .dot{width:6px;height:6px;border-radius:50%;background:#fff;flex:none;position:relative;top:6px}
.rij.klaar .tx{color:rgba(255,255,255,.45);text-decoration:line-through}
.tx{flex:1;min-width:0}
.meta{font-size:12px;color:rgba(255,255,255,.55);flex:none}

/* fases */
.fases{display:flex;gap:6px}
.fasestap{flex:1;display:flex;flex-direction:column;gap:6px}
.fdot{height:3px;border-radius:var(--r-pil);background:rgba(255,255,255,.25)}
.fasestap.done .fdot{background:#fff}
.flbl{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.fasestap.done .flbl{color:#fff}

/* mappen */
.map{margin-bottom:1px}
.maph{display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:none;border-top:1px solid rgba(255,255,255,.14);color:#fff;font-family:inherit;font-size:14px;padding:10px 0;cursor:pointer;text-align:left}
.map:first-child .maph{border-top:none}
.chev{display:inline-flex;color:rgba(255,255,255,.55);transition:transform .18s;flex:none}
.chev.open{transform:rotate(90deg)}
.mapnaam{flex:1;min-width:0} .mapcnt{font-size:12px;color:rgba(255,255,255,.5);flex:none}
.frij{padding:8px 0 8px 6px;font-size:13px;border-top:1px solid rgba(255,255,255,.1)}
.frij a{text-decoration:none;color:#fff}
.frij a:hover{text-decoration:underline}

/* rechterkolom */
.colR{background:rgba(0,0,0,.16);border-radius:var(--r-lg);padding:18px 20px;align-self:start}
.vst{padding:10px 0;border-top:1px solid rgba(255,255,255,.14)}
.vst:first-of-type{border-top:none}
.vst a{color:#fff;text-decoration:none} .vst a:hover{text-decoration:underline}
.akkoord{margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.2);text-align:center}
.akknoot{font-size:12px;color:rgba(255,255,255,.6);margin:0 0 12px}
.akkbtn{background:#fff;color:var(--rood);border:none;border-radius:var(--r-pil);font-family:inherit;font-weight:var(--fw-nadruk);font-size:14px;padding:11px 26px;cursor:pointer}
.akkbtn[disabled]{opacity:.5;cursor:default}
.akkoord.vast .groot{font-size:18px;color:#fff}
/* voorstellen per spoor */
.vstgroep{margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2)}
.vstgroep:first-of-type{border-top:none;margin-top:4px;padding-top:0}
.vstkop{font-size:15px;font-weight:var(--fw-nadruk);color:#fff}
.vstsub{font-size:12px;color:rgba(255,255,255,.6);margin:2px 0 8px}
.vstopen{background:transparent;border:none;color:#fff;font-family:inherit;font-size:14px;text-align:left;padding:0;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.poort{margin-top:12px}
.poort.groen{display:flex;align-items:center;gap:9px;font-size:14px;color:#9ff0bd;font-weight:var(--fw-nadruk)}
.poort .pdot{width:11px;height:11px;border-radius:50%;background:#5bd08a;flex:0 0 auto}
.poortnoot{font-size:11px;color:rgba(255,255,255,.55);margin-top:8px}
/* voorstel-viewer */
#vstViewer{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s;display:flex;flex-direction:column}
#vstViewer.on{opacity:1;pointer-events:auto}
#vstViewer .vv-bar{display:flex;align-items:center;gap:14px;padding:12px 18px;background:#2f1010;color:#fff}
#vstViewer .vv-naam{font-weight:var(--fw-nadruk);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#vstViewer .vv-ext{color:rgba(255,255,255,.8);font-size:13px;text-decoration:none}
#vstViewer .vv-ext:hover{color:#fff;text-decoration:underline}
#vstViewer .vv-x{background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1}
#vstViewer .vv-body{flex:1;background:#fff}
#vstViewer .vv-frame{width:100%;height:100%;border:none;display:block}

/* opmerkingen */
.opm{margin-top:14px;border-top:1px solid rgba(255,255,255,.14);padding-top:10px}
.opm-knop{background:none;border:none;color:rgba(255,255,255,.65);font-size:12px;padding:2px 0;display:flex;align-items:center;gap:7px}
.opm-knop:hover{color:#fff}
.opm-knop .chev{transition:transform .18s} .opm.open .opm-knop .chev{transform:rotate(90deg)}
.opm-body{max-height:0;overflow:hidden;transition:max-height .28s cubic-bezier(.16,1,.3,1)}
.opm.open .opm-body{max-height:1400px}
.opm-rij{padding:9px 0;border-top:1px solid rgba(255,255,255,.12)} .opm-rij:first-child{border-top:none;margin-top:8px}
.opm-wie{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:2px} .opm-wie b{color:#fff}
.opm textarea{width:100%;background:rgba(0,0,0,.14);border:1px solid rgba(255,255,255,.25);border-radius:var(--r-md);color:#fff;font-family:inherit;font-size:13px;padding:9px 11px;margin-top:10px;resize:vertical;min-height:56px;outline:none;box-shadow:none}
.opm textarea:focus{border-color:rgba(255,255,255,.5);outline:none;box-shadow:none}
.opm textarea::placeholder{color:rgba(255,255,255,.5)}
.knop{background:transparent;border:1px solid rgba(255,255,255,.3);border-radius:var(--r-md);color:#fff;font-size:13px;padding:7px 13px;margin-top:8px}
.knop:hover{border-color:#fff}

/* login */
.login{max-width:340px;margin:16vh auto;text-align:center}
.login .merk{width:34px;height:40px;margin:0 auto 26px}
.login input{width:100%;background:rgba(0,0,0,.14);border:1px solid rgba(255,255,255,.28);border-radius:var(--r-md);color:#fff;font-family:inherit;font-size:14px;padding:11px 13px;margin-bottom:10px}
.login input::placeholder{color:rgba(255,255,255,.55)}
.login .akkbtn{width:100%;margin-top:6px}
.login-fout{color:#ffd7d2;font-size:13px;min-height:20px;margin-top:12px}
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{-webkit-text-fill-color:#fff;caret-color:#fff;-webkit-box-shadow:0 0 0 40px var(--rood) inset;transition:background-color 9999s}
.midden{text-align:center;color:rgba(255,255,255,.65);padding:70px 20px}

#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(12px);opacity:0;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.3);border-radius:var(--r-md);padding:10px 16px;font-size:13px;transition:opacity .2s,transform .2s;pointer-events:none;z-index:20}
#toast.aan{opacity:1;transform:translateX(-50%)}

@media print{ #bgtint,#bg{display:none!important} .kop,.opm textarea,.knop,.akkbtn,#toast{display:none!important} }
</style>
</head>
<body>
<div id="bg"></div><div id="bgtint"></div>
<div id="app"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB_URL="https://rwevsqwvgqbzypaudzuj.supabase.co";
const SB_KEY="sb_publishable_m_mWsrZEQXlok9gEWFeTbQ_80vnBEQL";
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true}});

const MERK='<svg viewBox="0 0 147.39 172.8" fill="none" stroke="currentColor" stroke-width="4" width="100%" height="100%"><path d="M73.7 4v164.8"/><path d="M6 40l135.4 92.8"/><path d="M141.4 40L6 132.8"/></svg>';
const CHEV='<svg class="chev" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6l-6 6"/></svg>';

const EMBED=new URLSearchParams(location.search).get('embed')==='1';
let DATA=null, ACTIEF=0;
const OPEN_OPM=new Set(), OPEN_MAP=new Set();

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function datum(s){if(!s)return '';return new Date(s).toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});}
function kort(s){if(!s)return '';return new Date(s).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.className='aan';clearTimeout(el._t);el._t=setTimeout(()=>el.className='',3000);}
function mini(md){const uit=[];let a=[];const spoel=()=>{if(a.length){uit.push('<p style="margin:0 0 10px">'+a.join('<br>')+'</p>');a=[];}};
  String(md||'').split('\n').forEach(r=>{const t=r.trim();if(!t){spoel();return;}a.push(esc(t).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'));});spoel();return uit.join('');}

async function api(action,extra){
  const s=await sb.auth.getSession();const token=s.data.session&&s.data.session.access_token;
  if(!token){toonLogin();throw new Error('niet ingelogd');}
  const r=await fetch('/api/portal',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify(Object.assign({action},extra||{}))});
  const j=await r.json().catch(()=>({error:'onleesbaar'}));
  if(!r.ok){const e=new Error(j.error||'er ging iets mis');e.status=r.status;throw e;}
  return j;
}

/* login */
function toonLogin(fout){
  document.getElementById('app').innerHTML='<div class="login"><div class="merk">'+MERK+'</div>'
    +'<input id="lgMail" type="email" placeholder="E-mailadres" autocomplete="username">'
    +'<input id="lgWw" type="password" placeholder="Wachtwoord" autocomplete="current-password">'
    +'<button class="akkbtn" id="lgKnop">Inloggen</button><div class="login-fout">'+esc(fout||'')+'</div></div>';
  const doe=async()=>{const email=document.getElementById('lgMail').value.trim();const ww=document.getElementById('lgWw').value;
    if(!email||!ww)return;const k=document.getElementById('lgKnop');k.disabled=true;k.textContent='Momentje…';
    const {error}=await sb.auth.signInWithPassword({email,password:ww});
    if(error){toonLogin('Inloggen lukte niet. Klopt het wachtwoord?');return;}start();};
  document.getElementById('lgKnop').onclick=doe;
  document.getElementById('lgWw').onkeydown=e=>{if(e.key==='Enter')doe();};
}
async function uitloggen(){try{await sb.auth.signOut();}catch(_){}; location.href='/';}

/* render — hetzelfde dossier als de teamoverlay, read-only */
function statusTekst(p){ if(p.akkoord)return 'akkoord op '+kort(p.akkoord.approved_at);
  if(p.fase==='debrief')return 'wacht op jouw akkoord';
  return (p.fases[p.fase_index]||{}).l ? p.fases[p.fase_index].l.toLowerCase() : ''; }

function achtergrond(p){
  const b=document.body;
  if(p&&p.bg){ document.getElementById('bg').style.backgroundImage='url("'+p.bg+'")'; b.classList.add('heeftbg'); }
  else b.classList.remove('heeftbg');
}

function mappenHtml(files){
  if(!files||!files.length) return '<div class="leeg">Nog niets gedeeld.</div>';
  const groepen={},order=[];
  files.forEach(f=>{ const n=f.map||'Overig'; if(!groepen[n]){groepen[n]=[];order.push(n);} groepen[n].push(f); });
  return order.map(n=>{ const open=OPEN_MAP.has(n);
    const binnen=open?groepen[n].map(f=>'<div class="frij"><a href="'+esc(f.link||'#')+'" target="_blank" rel="noopener">'+esc(f.name)+'</a></div>').join(''):'';
    return '<div class="map"><button class="maph" onclick="mapToggle(\''+esc(n).replace(/'/g,"\\'")+'\')"><span class="chev'+(open?' open':'')+'">'+CHEV+'</span><span class="mapnaam">'+esc(n)+'</span><span class="mapcnt">'+groepen[n].length+'</span></button>'+binnen+'</div>';
  }).join('');
}
function mapToggle(n){ OPEN_MAP.has(n)?OPEN_MAP.delete(n):OPEN_MAP.add(n); render(); }

function render(){
  if(!DATA)return;
  const p=DATA.projecten[ACTIEF];
  achtergrond(p);
  if(!p){ document.getElementById('app').innerHTML='<div class="wrap">'+kopHtml(null)+'<div class="midden">Er staat nog niets voor je klaar.<br>We laten het weten zodra dat verandert.</div></div>';
    const u=document.getElementById('kopUit'); if(u)u.onclick=uitloggen; return; }

  let L='';
  if(p.toon_omschrijving && (p.omschrijving||'').trim()) L+='<div class="sec"><div class="h">Omschrijving</div><div class="tekst">'+mini(p.omschrijving)+'</div>'+opmHtml('omschrijving',p)+'</div>';
  if(p.toon_voortgang){ const bars=p.fases.map((f,i)=>'<div class="fasestap'+(i<=p.fase_index?' done':'')+'"><span class="fdot"></span><span class="flbl">'+esc(f.l)+'</span></div>').join('');
    L+='<div class="sec"><div class="h">Voortgang</div><div class="fases">'+bars+'</div>'+opmHtml('voortgang',p)+'</div>'; }
  if((p.wacht||[]).length) L+='<div class="sec"><div class="h">In afwachting</div>'+p.wacht.map(it=>'<div class="rij"><span class="dot"></span><span class="tx">'+esc(it.t||'')+'</span></div>').join('')+'</div>';
  if((p.taken||[]).length) L+='<div class="sec"><div class="h">Taken</div>'+p.taken.map(it=>'<div class="rij'+(it.done?' klaar':'')+'"><span class="dot"></span><span class="tx">'+esc(it.t||'')+'</span></div>').join('')+'</div>';
  if((p.afspraken||[]).length) L+='<div class="sec"><div class="h">Afspraken</div>'+p.afspraken.map(a=>'<div class="rij"><span class="tx">'+esc(a.t||'Afspraak')+'</span><span class="meta">'+esc(kort(a.date))+(a.start?' · '+esc(String(a.start).slice(0,5)):'')+'</span></div>').join('')+'</div>';
  if((p.bestanden||[]).length) L+='<div class="sec"><div class="h">Bestanden</div>'+mappenHtml(p.bestanden)+'</div>';
  if(!L) L='<div class="midden">Nog niets om te tonen.</div>';

  // rechterkolom: voorstellen per spoor (idee / budget), elk met eigen opmerkingen en akkoord.
  let R='<div class="h">Voorstellen</div>';
  const vs=p.voorstellen||[];
  if(!vs.length){ R+='<div class="leeg">Nog geen voorstellen.</div>'; }
  else {
    [['idee','Idee','Het ontwerp — wat we gaan maken.'],['budget','Budget','De kosten — wat het gaat kosten.']].forEach(([soort,titel,uitleg])=>{
      const lijst=vs.filter(f=>(f.soort||'idee')===soort);
      if(!lijst.length) return;
      const dt=(p.poorten||{})[soort];
      R+='<div class="vstgroep"><div class="vstkop">'+titel+'</div><div class="vstsub">'+uitleg+'</div>';
      R+=lijst.map(f=>'<div class="vst"><button class="vstopen" data-vopen="'+esc(f.id)+'" data-vlink="'+esc(f.link||'')+'" data-vnaam="'+esc(f.name)+'">'+esc(f.name)+'</button></div>').join('');
      if(dt) R+='<div class="poort groen"><span class="pdot"></span>Akkoord op '+esc(datum(dt))+'</div>';
      else R+='<div class="poort"><button class="akkbtn" data-gate="'+soort+'">Akkoord op '+titel.toLowerCase()+'</button><div class="poortnoot">Klopt er iets niet? Zet hieronder een opmerking; dan maken we een nieuwe ronde.</div></div>';
      R+=opmHtml('voorstel:'+soort,p);
      R+='</div>';
    });
    if(p.poorten&&p.poorten.idee&&p.poorten.budget) R='<div class="h">Voorstellen</div><div class="akkoord vast"><div class="groot">Idee én budget akkoord</div><div class="akknoot" style="margin-top:8px">Dit is de opdrachtbevestiging — we zijn in productie.</div></div>'+R.slice('<div class="h">Voorstellen</div>'.length);
  }

  document.getElementById('app').innerHTML='<div class="wrap">'+kopHtml(p)+'<div class="grid"><div class="colL">'+L+'</div><div class="colR">'+R+'</div></div></div>';
  bind(p);
}

function kopHtml(p){
  if(EMBED) return '';
  return '<div class="kop"><div class="merk">'+MERK+'</div>'
    +'<div class="kop-naam"><b>'+esc(DATA.klant.naam)+'</b>'+(p?' <span>· '+esc(p.naam)+'</span>':'')+'</div>'
    +(p?'<div class="kop-status">'+esc(statusTekst(p))+'</div>':'')
    +'<button class="kop-uit" id="kopUit">uitloggen</button></div>';
}

function opmHtml(sectie,p){
  const lijst=(p.opmerkingen&&p.opmerkingen[sectie])||[];
  const open=OPEN_OPM.has(sectie);
  const draad=lijst.map(c=>'<div class="opm-rij"><div class="opm-wie"><b>'+esc(c.author||'')+'</b> · '+esc(datum(c.created_at))+'</div><div>'+esc(c.body)+'</div></div>').join('');
  return '<div class="opm'+(open?' open':'')+'"><button class="opm-knop" data-opmtoggle="'+sectie+'">'+CHEV+'Opmerkingen'+(lijst.length?' ('+lijst.length+')':'')+'</button>'
    +'<div class="opm-body">'+draad+'<textarea id="ot_'+sectie+'" placeholder="Een opmerking bij dit onderdeel…"></textarea><div><button class="knop" data-opm="'+sectie+'">Plaatsen</button></div></div></div>';
}

function bind(p){
  const u=document.getElementById('kopUit'); if(u)u.onclick=uitloggen;
  document.querySelectorAll('[data-opmtoggle]').forEach(b=>b.onclick=()=>{ const s=b.dataset.opmtoggle; OPEN_OPM.has(s)?OPEN_OPM.delete(s):OPEN_OPM.add(s); const el=b.closest('.opm'); if(el)el.classList.toggle('open'); });
  document.querySelectorAll('[data-opm]').forEach(b=>b.onclick=async()=>{ const s=b.dataset.opm; const ta=document.getElementById('ot_'+s); const t=(ta.value||'').trim(); if(!t)return; b.disabled=true;
    try{ await api('reactie',{project_id:p.id,sectie:s,body:t}); ta.value=''; OPEN_OPM.add(s); toast('Geplaatst.'); await laad(); }catch(e){ toast(e.message); b.disabled=false; } });
  document.querySelectorAll('[data-gate]').forEach(b=>b.onclick=async()=>{ const soort=b.dataset.gate;
    if(!confirm('Akkoord geven op '+(soort==='budget'?'het budget':'het idee')+'? We gaan hiermee verder.'))return; b.disabled=true; b.textContent='Momentje…';
    try{ await api('akkoord',{project_id:p.id,soort}); toast('Akkoord vastgelegd.'); await laad(); }catch(e){ toast(e.message); b.disabled=false; b.textContent='Akkoord geven'; } });
  document.querySelectorAll('[data-vopen]').forEach(b=>b.onclick=()=>toonVoorstel(b.dataset.vlink,b.dataset.vnaam));
}

// Dropbox-link → server-proxy zodat het bestand INLINE rendert (Dropbox toont anders z'n eigen pagina).
function _vraw(link){ let u=String(link||'').replace('://www.dropbox.com/','://dl.dropboxusercontent.com/').replace('://dropbox.com/','://dl.dropboxusercontent.com/'); u=u.replace(/([?&])dl=\d&?/,'$1').replace(/[?&]$/,''); return u; }
function _vsrc(link){ return /dropbox/i.test(link||'') ? '/api/fileproxy?u='+encodeURIComponent(_vraw(link)) : (link||''); }
// Een voorstel-document (meestal een HTML-deck) schermvullend tonen, in een afgeschermde iframe.
function toonVoorstel(link,naam){
  if(!link){ toast('Dit voorstel heeft geen bestand.'); return; }
  let ov=document.getElementById('vstViewer');
  if(!ov){ ov=document.createElement('div'); ov.id='vstViewer';
    ov.innerHTML='<div class="vv-bar"><span class="vv-naam"></span><span style="flex:1"></span><a class="vv-ext" target="_blank" rel="noopener">nieuw tabblad ↗</a><button class="vv-x" title="Sluiten">✕</button></div><div class="vv-body"><iframe class="vv-frame" sandbox="allow-scripts allow-popups"></iframe></div>';
    document.body.appendChild(ov);
    ov.querySelector('.vv-x').onclick=()=>ov.classList.remove('on');
    document.addEventListener('keydown',e=>{ if(e.key==='Escape'){const o=document.getElementById('vstViewer'); if(o)o.classList.remove('on');} });
  }
  ov.querySelector('.vv-naam').textContent=naam||'Voorstel';
  ov.querySelector('.vv-ext').href=link;
  ov.querySelector('.vv-frame').src=_vsrc(link);
  ov.classList.add('on');
}

async function laad(){ const j=await api('data'); DATA=j; if(ACTIEF>=DATA.projecten.length)ACTIEF=0; render(); }

async function start(){
  const s=await sb.auth.getSession();
  if(!s.data.session) return toonLogin();
  const email=(s.data.session.user&&s.data.session.user.email)||'';
  if(!EMBED && /jeroen|marlon/i.test(email)){ location.replace('/'); return; }
  try{ await laad(); }
  catch(e){ if(/niet ingelogd/.test(e.message)) return toonLogin();
    document.getElementById('app').innerHTML='<div class="wrap"><div class="midden">Er staat nog geen portaal voor je klaar.<br><span style="font-size:13px">Neem contact op met Begeister als dit niet klopt.</span></div></div>'; }
}
sb.auth.onAuthStateChange(ev=>{ if(ev==='SIGNED_OUT') toonLogin(); });
start();
</script>
