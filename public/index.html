  html+=proposal.items.map((p,i)=>{const meta=[p.owner,p.due?dStr(p.due):'',projName(p.project_id)].filter(Boolean).join(' · ');
    return '<div class="prop-row"><input type="checkbox" checked onchange="proposal.items['+i+'].checked=this.checked">'
      +'<input class="prop-title" value="'+escapeHtml(p.title).replace(/"/g,'&quot;')+'" oninput="proposal.items['+i+'].title=this.value">'
      +'<span class="prop-pencil" onclick="this.previousElementSibling.focus()">✎</span>'
      +(meta?'<span class="prop-meta">'+escapeHtml(meta)+'</span>':'')+'</div>';}).join('');
  html+=proposal.updates.map((u,i)=>{const m=[];if(u.patch.due!==undefined)m.push(u.patch.due?dStr(u.patch.due):'geen datum');if(u.patch.owner!==undefined)m.push(u.patch.owner||'—');if(u.patch.project_id)m.push(projName(u.patch.project_id));
    return '<div class="prop-row"><input type="checkbox" checked onchange="proposal.updates['+i+'].checked=this.checked">'
      +'<span class="prop-title" style="opacity:.95">↻ '+escapeHtml(u.patch.title||u.title)+'</span>'
      +(m.length?'<span class="prop-meta">'+escapeHtml(m.join(' · '))+'</span>':'')+'</div>';}).join('');
  html+=proposal.removes.map((r,i)=>'<div class="prop-row"><input type="checkbox" checked onchange="proposal.removes['+i+'].checked=this.checked">'
      +'<span class="prop-title" style="opacity:.8;text-decoration:line-through">✕ '+escapeHtml(r.title||'taak')+'</span></div>').join('');
  html+=proposal.appointments.map((a,i)=>{const m=[a.date?dStr(a.date):'',a.start||'',a.kind==='bel'?'bel':'fysiek',a.contact,projName(a.project_id)].filter(Boolean).join(' · ');
    return '<div class="prop-row"><input type="checkbox" checked onchange="proposal.appointments['+i+'].checked=this.checked">'
      +'<span class="prop-title" style="opacity:.95">📅 '+escapeHtml(a.title)+'</span>'
      +(m?'<span class="prop-meta">'+escapeHtml(m)+'</span>':'')+'</div>';}).join('');
  html+='<div class="prop-foot"><button class="prop-save" onclick="saveProposal()">Opslaan</button></div>';
  card.innerHTML=html;
  t.appendChild(card); proposalCard=card; card.scrollIntoView&&card.scrollIntoView({block:'nearest'});
}
function dStr(due){try{return d(due).toLocaleDateString('nl-NL',{day:'numeric',month:'short'});}catch(_){return due;}}
async function saveProposal(){
  const news=proposal.items.filter(p=>p.checked&&p.title.trim());
  const ups=proposal.updates.filter(u=>u.checked&&Object.keys(u.patch).length);
  const rems=proposal.removes.filter(r=>r.checked&&r.id);
  const appts=(proposal.appointments||[]).filter(a=>a.checked&&a.title.trim()&&a.date);
  if(!news.length&&!ups.length&&!rems.length&&!appts.length){ addMsg('ai','Niets aangevinkt — ik bewaar niets.'); return; }
  // wijzigingen + verwijderingen op bestaande taken
  for(const u of ups){ await sb.from('items').update(u.patch).eq('id',u.id); }
  if(rems.length){ await sb.from('items').delete().in('id',rems.map(r=>r.id)); }
  // nieuwe afspraken
  if(appts.length){
    const arows=appts.map(a=>({project_id:a.project_id||null,title:a.title.trim(),owner:a.owner||null,contact:a.contact||null,
      kind:a.kind||'fysiek',location:a.location||null,date:a.date,start_time:a.start||null,end_time:a.end||null,note:null}));
    await sb.from('appointments').insert(arows);
  }
  // nieuwe taken
  let ins=[];
  if(news.length){
    const transcript=chatHistory.filter(m=>m.role==='user').map(m=>m.content).join('\n')||'(chat)';
    let srcId=pendingSourceId;
    if(!srcId){ const {data:src}=await sb.from('sources').insert({channel:'chat',sender:who||'Chat',body:transcript,processed:true}).select().single(); srcId=src?src.id:null; }
    const rows=news.map(p=>({project_id:p.project_id||null,source_id:srcId,title:p.title.trim(),owner:p.owner||null,contact:p.contact||null,due:p.due||null,status:'todo'}));
    const r=await sb.from('items').insert(rows).select('id,project_id'); ins=r.data||[];
  }
  lastAddedIds=[...ins.map(r=>r.id), ...ups.map(u=>u.id)];   // nieuw + verplaatst bovenaan
  const _np=[]; if(news.length)_np.push('voegde '+news.length+' actiepunt(en) toe'); if(ups.length)_np.push('paste '+ups.length+' taak/taken aan'); if(rems.length)_np.push('verwijderde '+rems.length+' taak/taken'); if(appts.length)_np.push('plande '+appts.length+' afspra'+(appts.length===1?'ak':'ken'));
  if(_np.length) notifyPartner((who||'Iemand')+' '+_np.join(', ')+'.');
  if(proposalCard){proposalCard.classList.add('saved');}
  const pids=[...new Set(ins.map(r=>r.project_id))];
  const orphan=ins.some(r=>!r.project_id);
  const onlyAppts = appts.length && !news.length && !ups.length && !rems.length;
  resetConversation();
  await refresh();
  if(news.length){ activeTab = orphan ? '__inbox__' : (pids.length===1&&pids[0] ? pids[0] : 'all'); }
  else { activeTab='all'; }   // alleen wijzigingen/verwijderingen → overzicht
  setView(onlyAppts ? 'afspraken' : 'taken');
}
function dateTable(){
  const days=['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const base=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
  const out=[];
  for(let i=0;i<16;i++){const dt=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
    const lbl=i===0?' (vandaag)':(i===1?' (morgen)':(i===2?' (overmorgen)':''));
    out.push(iso(dt)+' = '+days[dt.getDay()]+lbl);}
  return out.join('\n');
}
async function chatTurn(){
  const typing=addTyping();
  let data=null;
  try{
    const catalog=state.projects.filter(p=>p.id!=='__inbox__').map(p=>({project_id:p.id,client:p.client,project:p.project||''}));
    const existing=allItems().filter(x=>x.it.status!=='done').slice(0,90).map(x=>({id:x.it.id,title:x.it.t,owner:x.it.owner||'',due:x.it.due||null,client:x.p.client,project:x.p.project||''}));
    const ti=iso(TODAY);
    const appts=(state.appointments||[]).filter(a=>a.date>=ti).slice(0,40).map(a=>({title:a.t,date:a.date,start:a.start||'',kind:a.kind,contact:a.contact||'',client:a.projectId?projName(a.projectId):''}));
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({history:chatHistory,catalog,existing,appts,today:iso(TODAY),dates:dateTable(),who})});
    data=await r.json();
  }catch(_){}
  if(typing)typing.remove();
  return data;
}
async function chatSend(){
  const ta=document.getElementById('chatInput');const text=(ta.value||'').trim();if(!text)return;
  if(isMobile()&&view!=='home')setView('home');
  composeMode(true);
  addMsg('me',text);ta.value='';ta.style.height='auto';clearChips();closePlus();
  chatHistory.push({role:'user',content:text});
  const data=await chatTurn();
  if(!data||data.error||data.noai){ chatHistory.pop(); addMsg('ai','Sorry, ik ben er even niet bij — de AI is niet bereikbaar. Probeer het zo nog eens.'); const t=document.getElementById('chatInput'); if(t){t.value=text;t.dispatchEvent(new Event('input'));} return; }
  const reply=data.reply||'';
  if(reply){addMsg('ai',reply);chatHistory.push({role:'assistant',content:reply});}
  if((data.items&&data.items.length)||(data.updates&&data.updates.length)||(data.removes&&data.removes.length)||(data.appointments&&data.appointments.length)){ renderProposal(data); }
  if(data.action&&data.action.view){ doChatAction(data.action); }
}
function doChatAction(a){
  const map={taken:'taken',agenda:'agenda',afspraken:'afspraken',afspraak:'afspraken',wachter:'wachter',bronnen:'bronnen',klanten:'beheer'};
  const v=map[String(a.view||'').toLowerCase()]; if(!v) return;
  if(a.client){
    const p=state.projects.find(x=>x.id!=='__inbox__'&&x.client&&x.client.toLowerCase()===String(a.client).toLowerCase());
    if(p){ if(v==='taken')activeTab=p.id; if(v==='wachter')wachterTab=p.id; }
  } else { if(v==='taken')activeTab='all'; if(v==='wachter')wachterTab='all'; }
  _animateNext=true;
  setView(v);
}
let _greeted=false;
function chatGreet(){
  if(_greeted)return;_greeted=true;
  const inbox=state.projects.find(p=>p.id==='__inbox__');
  if(inbox&&inbox.items.length){
    const ids=inbox.items.map(i=>i.id);
    addMsg('ai','Er staan '+inbox.items.length+' binnengekomen ding(en) die ik nog niet kon plaatsen. Bij welke klant horen ze?');
    inbox.items.slice(0,6).forEach(i=>addMsg('ai','• '+i.t));
    renderClientChips(ids);
  }
  // herinnering: taken die al een tijdje zonder datum blijven staan
  const now=Date.now();
  const stale=allItems().filter(x=>x.p.id!=='__inbox__'&&x.it.status!=='done'&&!x.it.due&&(now-(x.it.created||now))>2*864e5);
  if(stale.length){
    addMsg('ai','Trouwens — '+stale.length+' taak/taken staat al een tijdje zónder datum. Zullen we er deadlines bij zetten? Bijvoorbeeld:');
    stale.slice(0,5).forEach(x=>addMsg('ai','• '+x.it.t+' ('+projName(x.p.id)+')'));
  }
}

// ---------- camera / bijlage / voice / beeld ----------
function openCamera(){closePlus();if(isMobile()&&view!=='home')setView('home');composeMode(true);document.getElementById('camInput').click();}
function chatAttach(){closePlus();if(isMobile()&&view!=='home')setView('home');composeMode(true);document.getElementById('attInput').click();}
function fileToB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const s=String(r.result);res(s.slice(s.indexOf(',')+1));};r.onerror=rej;r.readAsDataURL(f);});}
async function handlePhoto(e){
  const f=e.target.files&&e.target.files[0];if(!f)return;e.target.value='';
  if(isMobile()&&view!=='home')setView('home');
  composeMode(true);
  addMsg('me','Foto: '+f.name);
  chatHistory.push({role:'user',content:'(afbeelding toegevoegd: '+f.name+')'});
  // origineel bewaren onder Bronnen
  const {data:src}=await sb.from('sources').insert({channel:'camera',sender:who||'Camera',body:f.name,processed:true}).select().single();
  pendingSourceId=src?src.id:null;
  try{const path='chat/'+(src?src.id:Date.now())+'_'+f.name.replace(/[^\w.\-]/g,'_');
    const up=await sb.storage.from('intake').upload(path,f,{contentType:f.type,upsert:true});
    if(!up.error&&src){await sb.from('attachments').insert({source_id:src.id,filename:f.name,storage_path:path,mime:f.type,size:f.size});}
  }catch(_){}
  // AI-first: foto laten samenvatten + actiepunten voorstellen
  const typing=addTyping(); let data=null;
  try{
    const b64=await fileToB64(f);
    const catalog=state.projects.filter(p=>p.id!=='__inbox__').map(p=>({project_id:p.id,client:p.client,project:p.project||''}));
    const r=await fetch('/api/vision',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:b64,media_type:f.type||'image/jpeg',filename:f.name,catalog,today:iso(TODAY),dates:dateTable(),who})});
    data=await r.json();
  }catch(_){}
  if(typing)typing.remove();
  if(!data||data.error){ addMsg('ai','De foto staat onder Bronnen, maar ik kon \'m niet automatisch lezen. Vertel kort wat erop staat?'); return; }
  if(data.reply){ addMsg('ai',data.reply); chatHistory.push({role:'assistant',content:data.reply}); }
  if(data.items&&data.items.length){ renderProposal(data); }
  else { addMsg('ai','Geen concrete actiepunten uit de foto — vertel maar wat je ermee wilt.'); }
}
let _rec=null;
function voiceMode(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  closePlus();if(isMobile()&&view!=='home')setView('home');composeMode(true);
  if(!SR){addMsg('ai','Voice luisteren werkt nog niet in deze browser. Tip: gebruik het microfoontje op je toetsenbord — dat werkt altijd.');return;}
  if(_rec){_rec.stop();_rec=null;return;}
  _rec=new SR();_rec.lang='nl-NL';_rec.interimResults=true;_rec.continuous=false;
  const ta=document.getElementById('chatInput');const base=ta.value;
  _rec.onresult=ev=>{let s='';for(let i=0;i<ev.results.length;i++)s+=ev.results[i][0].transcript;ta.value=(base?base+' ':'')+s;};
  _rec.onerror=()=>{_rec=null;};_rec.onend=()=>{_rec=null;};
  _rec.start();
}
function createImage(){if(isMobile()&&view!=='home')setView('home');addMsg('ai','Beeld genereren zit er nog niet in — dat zet ik er als volgende stap in.');}

// ── PWA + push-notificaties ──
const VAPID_PUBLIC="BFD467bSbNKmU9lhok7tTlkRMt_QpM-d-_Nn4_R1Z86-F5I5NkvB3Bj0xSBMz-HkHFYHdupnActbSp4_3J7uJlg";
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true; }
function urlB64ToUint8(b){const pad='='.repeat((4-b.length%4)%4);const s=(b+pad).replace(/-/g,'+').replace(/_/g,'/');const raw=atob(s);return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}
async function enablePush(){
  document.getElementById('nav').classList.remove('open');
  const iOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(!('serviceWorker' in navigator)||!('PushManager' in window)||typeof Notification==='undefined'){
    alert(iOS?'Zet de app eerst op je beginscherm (deel-icoon → "Zet op beginscherm"), open ’m daar en zet dan meldingen aan.':'Meldingen worden in deze browser niet ondersteund.');
    return;
  }
  if(iOS && !isStandalone()){
    alert('Op de iPhone werkt dit alleen vanuit de app op je beginscherm. Tik op het deel-icoon → "Zet op beginscherm", open Begeister daar, en zet meldingen aan.');
    return;
  }
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){ alert('Meldingen zijn geblokkeerd. Je kunt dit aanzetten via de instellingen.'); return; }
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){ sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)}); }
    const j=sub.toJSON();
    await sb.from('push_subs').upsert({endpoint:j.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth,who:(who||'')},{onConflict:'endpoint'});
    try{reg.showNotification('Begeister',{body:'Meldingen staan aan op dit apparaat ✓',icon:'/icon-192.png'});}catch(_){}
    alert('Gelukt — meldingen staan aan op dit apparaat.');
  }catch(e){ console.warn('push',e); alert('Meldingen aanzetten lukte niet: '+(e&&e.message||e)); }
}

// ── auth ──
function showLogin(){document.getElementById('authgate').style.display='flex';}
function hideLogin(){document.getElementById('authgate').style.display='none';}
async function sbLogin(){
  const email=document.getElementById('auth_email').value.trim();
  const password=document.getElementById('auth_pass').value;
  const msg=document.getElementById('auth_msg');
  if(!email||!password){msg.textContent='Vul je mailadres en wachtwoord in.';return;}
  msg.textContent='Bezig…';
  const {error}=await sb.auth.signInWithPassword({email,password});
  msg.textContent = error ? 'Onjuist mailadres of wachtwoord.' : '';
}
let _booted=false;
async function startApp(session){
  hideLogin();
  const email=(session&&session.user&&session.user.email)||'';
  who = /jeroen/i.test(email)?'Jeroen':(/marlon/i.test(email)?'Marlon':'Jeroen');
  const el=document.getElementById('who'); if(el){el.textContent=who;} const av=document.getElementById('userAv'); if(av)av.textContent=who[0];
  await refresh();
  applyLayout();
  if(!_booted){_booted=true; setView('taken'); showWelcome(); chatGreet();}
}
sb.auth.getSession().then(({data})=>{ if(data.session) startApp(data.session); else showLogin(); });
sb.auth.onAuthStateChange((_e,session)=>{ if(session) startApp(session); else showLogin(); });
['auth_email','auth_pass'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')sbLogin();}));
